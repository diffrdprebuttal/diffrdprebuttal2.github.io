<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DiffRDP Demo</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #121317;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #3aa8ff;
      --shadow: 0 1px 10px rgba(0,0,0,0.25);
      --bar-width: 2px;
      --handle-size: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }
    header {
      padding: 18px 16px 8px;
      background: var(--panel);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }
    .instructions {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .controls, .subcontrols {
      display: grid;
      gap: 8px 12px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 8px 16px;
    }
    .controls {
      grid-template-columns: 1fr;
      background: var(--panel);
    }
    .subcontrols {
      grid-template-columns: 1fr 1fr;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
    }
    label {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 84px;
    }
    select {
      width: 100%;
      appearance: none;
      background: #1a1c22;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.2;
    }
    main {
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .compare {
      position: relative;
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9; /* Adjust if your images differ */
      overflow: hidden;
      border-radius: 10px;
      background: #111;
      user-select: none;
      touch-action: none;
      box-shadow: var(--shadow);
    }
    .compare img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* use contain if needed */
      pointer-events: none;
    }
    .compare__top {
      clip-path: inset(0 50% 0 0);
      transition: clip-path 0.1s ease-out;
    }
    .compare__bar {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: var(--bar-width);
      background: rgba(255,255,255,0.9);
      transform: translateX(-50%);
      pointer-events: none;
    }
    .compare__handle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--handle-size);
      height: var(--handle-size);
      background: #fff;
      border: 2px solid rgba(0,0,0,0.35);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .compare__track {
      position: absolute;
      inset: 0;
      cursor: ew-resize;
    }
    /* Corner labels */
    .compare__label {
      position: absolute;
      padding: 6px 10px;
      font-size: 13px;
      line-height: 1.1;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 6px;
      backdrop-filter: blur(2px);
      max-width: 48%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .compare__label--tl { top: 10px; left: 10px; }
    .compare__label--tr { top: 10px; right: 10px; text-align: right; }
    .compare__label--bl { bottom: 10px; left: 10px; }
    .compare__label--br { bottom: 10px; right: 10px; text-align: right; }
    .note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
      max-width: 1200px;
    }
    @media (max-width: 820px) {
      .subcontrols { grid-template-columns: 1fr; }
      label { min-width: 72px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Comparison Between ODE Reconstructions (Left) and Linear Combinations (Right)</h1>
    <p class="instructions">
      Drag the slider to compare reconstructions. Use the dropdowns to pick images.
    </p>
  </header>

  <!-- Macro control: dataset selector -->
  <section class="controls">
    <div class="row">
      <label for="datasetSelect">Images:</label>
      <select id="datasetSelect">
        <!-- Populate by JS from DATASETS -->
      </select>
    </div>
  </section>

  <!-- Subcontrols: left/right pickers -->
  <section class="subcontrols">
    <div class="row">
      <label for="leftSelect">Left:</label>
      <select id="leftSelect"></select>
    </div>
    <div class="row">
      <label for="rightSelect">Right:</label>
      <select id="rightSelect"></select>
    </div>
  </section>

  <main>
    <div class="compare" id="compare" role="group" aria-label="Image comparison slider">
      <!-- Right/bottom image -->
      <img class="compare__bottom" id="imgRight" src="" alt="Right image" />
      <!-- Left/top image -->
      <img class="compare__top" id="imgLeft" src="" alt="Left image" />

      <div class="compare__bar" aria-hidden="true"></div>
      <div class="compare__handle" aria-hidden="true"></div>
      <div class="compare__track" aria-hidden="true"></div>

      <!-- Corner labels -->
      <div class="compare__label compare__label--tl" id="labelLeftName">—</div>
      <div class="compare__label compare__label--tr" id="labelRightName">—</div>
      <div class="compare__label compare__label--bl" id="labelLeftMSE">MSE: —</div>
      <div class="compare__label compare__label--br" id="labelRightMSE">MSE: —</div>
    </div>

    <p class="note">Tip: Use Left/Right Arrow keys to move the slider. Hold Shift for larger steps.</p>
  </main>

  <script>
    // Define your datasets here.
    // Each dataset has:
    // - name: shown in the dataset dropdown
    // - basePath: prepended to every filename in this dataset (can be "" if files sit next to HTML)
    // - leftOptions: array of { label, file } for the left side (e.g., HiFiC variants)
    // - rightOptions: array of { label, file } for the right side (e.g., GT/JPG variants)
    // - mseLeft/mseRight: optional lookup of precomputed MSE by full src (basePath + file)
    const DATASETS = [
      {
        id: 'setA',
        name: 'Kodak07.png',
        basePath: 'web-images/setA/', // e.g., images/setA/hific-1.jpg
        leftOptions: [
          { label: 'ODE Recon.', file: 'ODE_07.png' },
        ],
        rightOptions: [
          { label: 'Linear Comb.', file: 'LC_07.png' },
        ],
        mseLeft: {
          'web-images/setA/ODE_07.png': 0.00695,
        },
        mseRight: {
          'web-images/setA/LC_07.png': 0.00679,
        },
        bppLeft: {
          'web-images/setA/ODE_07.png': 0.015,
        },
        bppRight: {
          'web-images/setA/LC_07.png': 0.015,
        }
      },
      {
        id: 'setB',
        name: 'Kodak03.png',
        basePath: 'web-images/setB/',
        leftOptions: [
          { label: 'ODE Recon.', file: 'ODE_03.png' },
        ],
        rightOptions: [
          { label: 'Linear Comb.', file: 'LC_03.png' },
        ],
        mseLeft: {
          'web-images/setB/ODE_03.png': 0.00299,
        },
        mseRight: {
          'web-images/setB/LC_03.png': 0.00301,
        },
        bppLeft: {
          'web-images/setB/ODE_03.png': 0.015,
        },
        bppRight: {
          'web-images/setB/LC_03.png': 0.015,
        }
      },
    ];

    (function() {
      // Elements
      const datasetSelect = document.getElementById('datasetSelect');
      const leftSelect = document.getElementById('leftSelect');
      const rightSelect = document.getElementById('rightSelect');

      const compare = document.getElementById('compare');
      const imgLeft = document.getElementById('imgLeft');
      const imgRight = document.getElementById('imgRight');
      const bar = compare.querySelector('.compare__bar');
      const handle = compare.querySelector('.compare__handle');
      const track = compare.querySelector('.compare__track');

      const labelLeftName = document.getElementById('labelLeftName');
      const labelRightName = document.getElementById('labelRightName');
      const labelLeftMSE = document.getElementById('labelLeftMSE');
      const labelRightMSE = document.getElementById('labelRightMSE');

      // Slider state
      let x = 0.5;
      let dragging = false;
      function updateClipAndBar() {
        const percent = (x * 100).toFixed(4) + '%';
        imgLeft.style.clipPath = `inset(0 ${100 - x * 100}% 0 0)`;
        bar.style.left = percent;
        handle.style.left = percent;
      }
      function setFromClientX(clientX) {
        const rect = compare.getBoundingClientRect();
        x = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
        updateClipAndBar();
      }
      updateClipAndBar();

      // Populate dataset dropdown
      function populateDatasets() {
        datasetSelect.innerHTML = '';
        for (const ds of DATASETS) {
          const opt = document.createElement('option');
          opt.value = ds.id;
          opt.textContent = ds.name;
          datasetSelect.appendChild(opt);
        }
        // Select the first dataset by default
        if (DATASETS.length) datasetSelect.value = DATASETS[0].id;
      }

      // Populate left/right selects based on active dataset
      function populateSideSelects(ds) {
        leftSelect.innerHTML = '';
        rightSelect.innerHTML = '';
        ds.leftOptions.forEach((o, i) => {
          const opt = document.createElement('option');
          opt.value = ds.basePath + o.file;
          opt.textContent = o.label;
          if (i === 0) opt.selected = true;
          leftSelect.appendChild(opt);
        });
        ds.rightOptions.forEach((o, i) => {
          const opt = document.createElement('option');
          opt.value = ds.basePath + o.file;
          opt.textContent = o.label;
          if (i === 0) opt.selected = true;
          rightSelect.appendChild(opt);
        });
      }

      // Helpers
      function preloadAndSwap(img, newSrc, cb) {
        const tmp = new Image();
        tmp.onload = () => { img.src = newSrc; cb && cb(); };
        tmp.onerror = () => { console.warn('Failed to load', newSrc); cb && cb(); };
        tmp.src = newSrc;
      }
      function updateLeftLabels(ds) {
        const name = leftSelect.options[leftSelect.selectedIndex]?.textContent || '—';
        const src = leftSelect.value;
        labelLeftName.textContent = name;
        const mse = (ds.mseLeft && ds.mseLeft[src] !== undefined) ? ds.mseLeft[src] : '—';
        const bpp = (ds.bppLeft && ds.bppLeft[src] !== undefined) ? ds.bppLeft[src] : '—';
        labelLeftMSE.textContent = 'MSE: ' + mse + ', BPP: ' + bpp;
      }
      function updateRightLabels(ds) {
        const name = rightSelect.options[rightSelect.selectedIndex]?.textContent || '—';
        const src = rightSelect.value;
        labelRightName.textContent = name;
        const mse = (ds.mseRight && ds.mseRight[src] !== undefined) ? ds.mseRight[src] : '—';
        const bpp = (ds.bppRight && ds.bppRight[src] !== undefined) ? ds.bppRight[src] : '—';
        labelRightMSE.textContent = 'MSE: ' + mse + ', BPP: ' + bpp;
      }

      // Apply current dataset selections to images and labels
      function applyDataset(ds) {
        // Use currently selected or default first options
        const leftSrc = leftSelect.value || (ds.basePath + ds.leftOptions[0].file);
        const rightSrc = rightSelect.value || (ds.basePath + ds.rightOptions[0].file);

        preloadAndSwap(imgLeft, leftSrc, updateClipAndBar);
        preloadAndSwap(imgRight, rightSrc, updateClipAndBar);

        updateLeftLabels(ds);
        updateRightLabels(ds);
      }

      // Get active dataset object
      function currentDataset() {
        const id = datasetSelect.value;
        return DATASETS.find(d => d.id === id);
      }

      // Init
      populateDatasets();
      populateSideSelects(currentDataset());
      applyDataset(currentDataset());

      // Events
      datasetSelect.addEventListener('change', () => {
        const ds = currentDataset();
        // Repopulate side selectors for this dataset
        populateSideSelects(ds);
        // Apply the dataset defaults to images and labels
        applyDataset(ds);
      });

      leftSelect.addEventListener('change', () => {
        const ds = currentDataset();
        updateLeftLabels(ds);
        preloadAndSwap(imgLeft, leftSelect.value, updateClipAndBar);
      });
      rightSelect.addEventListener('change', () => {
        const ds = currentDataset();
        updateRightLabels(ds);
        preloadAndSwap(imgRight, rightSelect.value, updateClipAndBar);
      });

      // Drag interactions
      track.addEventListener('mousedown', (e) => { dragging = true; setFromClientX(e.clientX); e.preventDefault(); });
      window.addEventListener('mousemove', (e) => { if (dragging) setFromClientX(e.clientX); });
      window.addEventListener('mouseup', () => dragging = false);

      track.addEventListener('touchstart', (e) => { dragging = true; setFromClientX(e.touches[0].clientX); }, { passive: true });
      window.addEventListener('touchmove', (e) => { if (dragging) setFromClientX(e.touches[0].clientX); }, { passive: true });
      window.addEventListener('touchend', () => dragging = false);

      // Keyboard
      compare.tabIndex = 0;
      compare.addEventListener('keydown', (e) => {
        const step = e.shiftKey ? 0.05 : 0.02;
        if (e.key === 'ArrowLeft') x = Math.max(0, x - step);
        else if (e.key === 'ArrowRight') x = Math.min(1, x + step);
        else return;
        updateClipAndBar();
        e.preventDefault();
      });

      window.addEventListener('resize', updateClipAndBar);
    })();
  </script>
</body>
</html>
